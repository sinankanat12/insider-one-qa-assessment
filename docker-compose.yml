version: "3.8"

services:

  # ----------------------------------------------------------
  # Selenium Hub (Grid 4)
  # ----------------------------------------------------------
  selenium-hub:
    image: selenium/hub:4.18.1
    container_name: selenium-hub
    ports:
      - "4444:4444"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 10s
      timeout: 10s
      retries: 6
    networks:
      - qa-network
    profiles:
      - ui

  # ----------------------------------------------------------
  # Chrome Node
  # ----------------------------------------------------------
  chrome-node:
    image: selenium/node-chrome:4.18.1
    container_name: chrome-node
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
    shm_size: "2g"
    networks:
      - qa-network
    profiles:
      - ui

  # ----------------------------------------------------------
  # Firefox Node
  # ----------------------------------------------------------
  firefox-node:
    image: selenium/node-firefox:4.18.1
    container_name: firefox-node
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
    shm_size: "2g"
    networks:
      - qa-network
    profiles:
      - ui

  # ----------------------------------------------------------
  # UI Automation (Test Runner)
  # ----------------------------------------------------------
  ui-automation:
    build:
      context: ./ui-automation
      dockerfile: Dockerfile
    container_name: ui-automation
    depends_on:
      selenium-hub:
        condition: service_healthy
      chrome-node:
        condition: service_started
      firefox-node:
        condition: service_started
    environment:
      - BROWSER=${BROWSER:-chrome}
      - GRID_URL=http://selenium-hub:4444/wd/hub
    networks:
      - qa-network
    profiles:
      - ui

  # ----------------------------------------------------------
  # API Automation (e.g. RestAssured / Pytest / Karate)
  # ----------------------------------------------------------
  api-automation:
    build:
      context: ./api-automation
      dockerfile: Dockerfile
    container_name: api-automation
    environment:
      - ENV=ci
      - BASE_URL=${BASE_URL:-https://api.example.com}
    volumes:
      - ./api-automation:/app
      - ./reports/api:/app/reports
    networks:
      - qa-network
    profiles:
      - api

  # ----------------------------------------------------------
  # Load Testing (e.g. k6 / Gatling / Locust)
  # ----------------------------------------------------------
  load-testing:
    build:
      context: ./load-testing
      dockerfile: Dockerfile
    container_name: load-testing
    environment:
      - ENV=ci
      - TARGET_URL=${TARGET_URL:-https://api.example.com}
      - VIRTUAL_USERS=${VIRTUAL_USERS:-10}
      - DURATION=${DURATION:-30s}
    volumes:
      - ./load-testing:/app
      - ./reports/load:/app/reports
    networks:
      - qa-network
    profiles:
      - load

networks:
  qa-network:
    driver: bridge

volumes:
  reports:
