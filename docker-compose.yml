version: "3.8"

services:

  # ----------------------------------------------------------
  # Selenium Hub (Grid 4)
  # ----------------------------------------------------------
  selenium-hub:
    image: seleniarm/hub:4.18.1
    container_name: selenium-hub
    ports:
      - "4444:4444"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4444/wd/hub/status" ]
      interval: 10s
      timeout: 10s
      retries: 6
    networks:
      - qa-network
    profiles:
      - ui

  # ----------------------------------------------------------
  # Chrome Node
  # ----------------------------------------------------------
  chrome-node:
    image: seleniarm/node-chromium:4.18.1
    container_name: chrome-node
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
    shm_size: "2g"
    ports:
      - "7900:7900"
    networks:
      - qa-network
    profiles:
      - ui

  # ----------------------------------------------------------
  # Firefox Node
  # ----------------------------------------------------------
  firefox-node:
    image: seleniarm/node-firefox:4.18.1
    container_name: firefox-node
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
    shm_size: "2g"
    ports:
      - "7901:7900"
    networks:
      - qa-network
    profiles:
      - ui

  # ----------------------------------------------------------
  # UI Automation (Test Runner)
  # ----------------------------------------------------------
  ui-automation:
    build:
      context: ./ui-automation
      dockerfile: Dockerfile
    container_name: ui-automation
    depends_on:
      selenium-hub:
        condition: service_healthy
      chrome-node:
        condition: service_started
      firefox-node:
        condition: service_started
    environment:
      - BROWSER=${BROWSER:-chrome}
      - GRID_URL=http://selenium-hub:4444/wd/hub
    networks:
      - qa-network
    profiles:
      - ui

  # ----------------------------------------------------------
  # API Automation (e.g. RestAssured / Pytest / Karate)
  # ----------------------------------------------------------
  api-automation:
    build:
      context: ./api-automation
      dockerfile: Dockerfile
    container_name: api-automation
    environment:
      - ENV=ci
      - BASE_URL=${BASE_URL:-https://api.example.com}
    volumes:
      - ./api-automation:/app
      - ./reports/api:/app/reports
    networks:
      - qa-network
    profiles:
      - api

  # ----------------------------------------------------------
  # Load Testing — Frontend Dashboard
  # ----------------------------------------------------------
  load-frontend:
    build:
      context: ./load-testing/frontend
      dockerfile: Dockerfile
    container_name: load-frontend
    ports:
      - "3000:80"
    depends_on:
      load-backend:
        condition: service_healthy
    networks:
      - qa-network
    profiles:
      - load

  # ----------------------------------------------------------
  # Load Testing — Backend API
  # ----------------------------------------------------------
  load-backend:
    build:
      context: ./load-testing
      dockerfile: ./backend/Dockerfile
    container_name: load-backend
    ports:
      - "8000:8000"
    env_file:
      - ./load-testing/.env
    volumes:
      - locust-data:/app/results
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - qa-network
    profiles:
      - load

  # ----------------------------------------------------------
  # Load Testing — Locust Engine
  # ----------------------------------------------------------
  load-locust:
    build:
      context: ./load-testing/locust
      dockerfile: Dockerfile
    container_name: load-locust
    ports:
      - "8089:8089"
    env_file:
      - ./load-testing/.env
    depends_on:
      load-backend:
        condition: service_healthy
    volumes:
      - locust-data:/app/results
    networks:
      - qa-network
    profiles:
      - load

networks:
  qa-network:
    driver: bridge

volumes:
  reports:
  locust-data:
